<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        rajdhani: ['Rajdhani', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif']
                    },

                    colors: {
                        neon: {
                            green: '#39FF14', blue: '#00D4FF', purple: '#BF5FFF'
                        },

                        shark: {
                            950: '#050609', 900: '#0a0c12', 850: '#0f1118', 800: '#141720',
                            750: '#181c28', 700: '#1e2333', 600: '#252c40', 500: '#2e3650',
                        },
                    },

                    boxShadow: {
                        'neon-green': '0 0 20px rgba(57, 255, 20, 0.35), 0 0 60px rgba(57, 255, 20, 0.12)',
                    },

                    animation: {
                        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },

                    keyframes: {
                        glowPulse: {
                            '0%, 100%': { boxShadow: '0 0 10px rgba(57,255,20,0.3)' },
                            '50%': { boxShadow: '0 0 25px rgba(57,255,20,0.6), 0 0 50px rgba(57,255,20,0.2)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-8px)' },
                        }
                    },
                },
            },
        };
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0c12;
        }

        ::-webkit-scrollbar-thumb {
            background: #39FF14;
            border-radius: 10px;
        }

        .glass {
            background: rgba(10, 12, 18, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        select {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
    <title>Document</title>
</head>

<body class="min-h-screen flex flex-col font-body text-slate-200 bg-shark-950 relative overflow-x-hidden">
    <div class="fixed inset-0 opacity-100 pointer-events-none z-0"
        style="background-size:40px 40px; background-image: linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);">
    </div>

    <div class="fixed top-0 left-1/4 w-96 h-96 rounded-full pointer-events-none z-0"
        style="background:radial-gradient(circle, rgba(57,255,20,0.04) 0%, transparent 70%);"></div>
    <div class="fixed bottom-1/4 right-1/4 w-80 h-80 rounded-full pointer-events-none z-0"
        style="background:radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);"></div>
    <div class="fixed top-1/2 left-0 w-72 h-72 rounded-full pointer-events-none z-0"
        style="background:radial-gradient(circle, rgba(191,95,255,0.03) 0%, transparent 70%);"></div>

    <header class="glass sticky top-0 z-50 h-16 flex items-center px-4 md:px-8">
        <div class="max-w-screen-2xl mx-auto w-full flex items-center gap-6 justify-between">

            <a href="#" class="flex items-center gap-2.5 flex-shrink-0 group">
                <div class="relative w-9 h-9 flex items-center justify-center">
                    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="w-9 h-9 transition-all duration-300 group-hover:drop-shadow-[0_0_8px_rgba(57,255,20,0.8)]">
                        <path
                            d="M4 28 C4 28, 8 10, 18 8 C24 7, 30 12, 32 20 L28 22 C26 16, 22 13, 18 14 C12 15, 8 24, 8 24 Z"
                            fill="#39FF14" opacity="0.9" />
                        <path d="M28 22 L32 20 L30 28 Z" fill="#00D4FF" opacity="0.8" />
                        <circle cx="22" cy="11" r="1.5" fill="#050609" />
                        <path d="M12 22 Q15 18 20 19" stroke="rgba(57,255,20,0.4)" stroke-width="1" fill="none" />
                    </svg>
                </div>
                <div>
                    <span class="font-display font-bold text-xl tracking-[0.15em] text-white uppercase">Mark<span
                            class="text-neon-green">Deals</span></span>
                    <div class="flex items-center gap-1 -mt-0.5">
                        <div class="w-1 h-1 bg-neon-green rounded-full shadow-[0_0_8px_#39FF14]"></div>
                        <span class="text-[9px] text-slate-500 tracking-[0.2em] uppercase font-body">Game Deals
                            Tracker</span>
                    </div>
                </div>
            </a>

            <div class="flex-1 flex justify-center px-4 max-w-xl">
                <div class="relative w-full flex justify-center">
                    <input id="search-input" type="search" placeholder="Search games, titles, deals…"
                        class="bg-shark-800/80 border border-shark-600 text-slate-200 text-sm rounded-full pl-9 pr-4 py-2.5 font-body placeholder:text-slate-600 focus:border-neon-green/60 focus:outline-none focus:ring-1 focus:ring-neon-green/50 transition-all duration-300 w-full md:w-[280px] focus:md:w-[340px]" />
                    <div
                        class="absolute right-3 top-1/2 -translate-y-1/2 hidden md:flex items-center gap-0.5 pointer-events-none">
                    </div>
                </div>
            </div>
        </div>
    </header>
    <section class="relative overflow-hidden" id="hero">
        <div class="absolute inset-0 bg-gradient-to-br from-shark-950 via-shark-900 to-shark-800 z-0"></div>

        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-0 right-0 w-1/2 h-full"
                style="background: linear-gradient(135deg, transparent 50%, rgba(57, 255, 20, 0.02) 50%);"></div>
            <div class="absolute bottom-0 left-0 w-2/3 h-px"
                style="background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.02), transparent);"></div>
        </div>

        <div
            class="relative z-10 max-w-screen-2xl mx-auto px-4 md:px-8 py-12 md:py-20 flex flex-col lg:flex-row items-center gap-10 lg:gap-16 min-h-130">

            <div class="flex-1 order-2 lg:order-1">

                <div class="flex items-center gap-3 mb-5">
                    <div class="w-2 h-2 bg-neon-green rounded-full animate-glow-pulse"></div>
                    <span class="text-sm tracking-[0.3em] text-neon-green uppercase font-display font-bold">Oferta do
                        Dia</span>
                    <div class="h-px flex-1 max-w-16 bg-gradient-to-r from-neon-green/50 to-transparent"></div>
                </div>

                <h1 id="hero-title"
                    class="font-display font-bold text-4xl md:text-5xl xl:text-6xl text-white leading-none mb-4 uppercase tracking-tight">
                    Cyberpunk<br><span class="text-neon-green drop-shadow-[0_0_15px_rgba(57,255,20,0.4)]">2077</span>
                </h1>

                <div class="flex items-center gap-6 mb-8">
                    <div id="hero-discount"
                        class="flex items-center justify-center px-4 py-2 rounded-full font-display font-bold text-xl animate-glow-pulse border border-neon-green/50 text-neon-green bg-neon-green/10 shadow-[0_0_10px_rgba(57,255,20,0.3)]">
                    </div>

                    <div>
                        <div id="hero-normal-price" class="text-slate-500 text-sm line-through font-body">$59.99</div>
                        <div id="hero-sale-price"
                            class="font-display font-bold text-3xl text-neon-green drop-shadow-[0_0_10px_rgba(57,255,20,0.30)]">
                        </div>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-4">
                    <a id="hero-cta" href="#" target="_blank"
                        class="inline-flex items-center gap-2.5 px-7 py-3 rounded-full font-display font-bold text-sm uppercase tracking-widest text-shark-950 transition-all duration-300 hover:scale-105 hover:shadow-[0_0_30px_rgba(57,255,20,0.4)]"
                        style="background: linear-gradient(135deg, #39ff14, #00d4ff);">
                        Adquira essa oferta
                    </a>
                </div>
            </div>

            <div class="flex-1 order-1 lg:order-2 flex justify-center lg:justify-end relative">
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-64 h-64 rounded-full"
                        style="background: radial-gradient(circle, rgba(57,255,20,0.15) 0%, transparent 70%);"></div>
                </div>

                <div
                    class="relative w-full max-w-md rounded-2xl overflow-hidden border border-neon-green/20 shadow-[0_30px_60px_rgba(0,0,0,0.6)] animate-float">
                    <div class="aspect-video w-full bg-shark-800 flex items-center justify-center">
                        <img id="hero-img"
                            alt="Game Cover" class="w-full h-full object-cover" />
                    </div>
                    <div
                        class="absolute top-3 left-3 w-5 h-5 border-t-2 border-l-2 border-neon-green/60 rounded-tl-lg pointer-events-none">
                    </div>
                    <div
                        class="absolute bottom-3 right-3 w-5 h-5 border-b-2 border-r-2 border-neon-green/60 rounded-br-lg pointer-events-none">
                    </div>
                </div>
            </div>

        </div>
        <div class="absolute bottom-0 left-0 right-0 h-16 z-10 bg-gradient-to-t from-shark-950 to-transparent"></div>
    </section>

    <div class="sticky top-16 z-40 glass border-b border-shark-700/50">
        <div class="max-w-screen-2xl mx-auto px-4 md:px-8 py-3 flex items-center gap-4 justify-between">
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar flex-1">
                <button
                    class="store-pill active flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-display font-bold uppercase tracking-wider border border-neon-green/50 bg-neon-green/10 text-neon-green shadow-[0_0_15px_rgba(57,255,20,0.2)] transition-all"
                    data-store="all">
                    Todos
                </button>

                <button
                    class="store-pill flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-display font-bold uppercase tracking-wider border border-shark-600 text-slate-400 hover:bg-shark-700 hover:text-white transition-all"
                    data-store="1">
                    Steam
                </button>

                <button
                    class="store-pill flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-display font-bold uppercase tracking-wider border border-shark-600 text-slate-400 hover:bg-shark-700 hover:text-white transition-all"
                    data-store="25">
                    Epic Games
                </button>

                <button
                    class="store-pill flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-display font-bold uppercase tracking-wider border border-shark-600 text-slate-400 hover:bg-shark-700 hover:text-white transition-all"
                    data-store="7">
                    GOG
                </button>

            </div>

            <div class="hidden md:block w-px h-6 bg-shark-600 flex-shrink-0"></div>

            <div class="flex-shrink-0 relative flex items-center gap-4">

                <div class="flex items-center gap-2">
                    <label for="sort-select" class="text-xs text-slate-500 font-body hidden md:block">Ordernar
                        por</label>
                    <div class="relative">
                        <select id="sort-select"
                            class="bg-shark-800/80 pl-3 pr-8 py-1.5 rounded-lg text-xs font-body text-slate-300 border border-shark-600 hover:border-slate-500 focus:border-neon-blue/60 focus:outline-none transition-all cursor-pointer">
                            <option value="DealRating">Avaliação do Desconto</option>
                            <option value="Price">Preço: Menor → Maior</option>
                            <option value="Savings">% de Desconto</option>
                            <option value="Release">Data de Lançamento</option>
                        </select>
                        <div class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                            ▼
                        </div>
                    </div>
                </div>

                <div class="hidden lg:flex items-center gap-2">
                    <label for="max-price" class="text-xs text-slate-500 font-body">Max $</label>
                    <input id="max-price" type="number" min="0" max="60" placeholder="50"
                        class="w-16 bg-shark-800/80 px-2 py-1.5 rounded-lg text-xs font-body text-slate-300 border border-shark-600 hover:border-slate-500 focus:border-neon-blue/60 focus:outline-none transition-all text-center">
                </div>
            </div>
        </div>
    </div>
    <main id="main-content" class="relative z-10 max-w-screen-2xl mx-auto px-4 md:px-8 py-10">

        <div class="flex items-center justify-between mb-8">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-2 h-2 bg-neon-green rounded-full shadow-[0_0_8px_#39FF14]"></div>
                    <h2 id="deals-title" class="font-display font-bold text-2xl text-white uppercase tracking-wider">Ofertas em Destaque</h2>
                </div>
            </div>
        </div>

        <div id="skeleton-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            
            <article class="rounded-2xl overflow-hidden bg-shark-800 border border-shark-700/50 animate-pulse">
                <div class="aspect-video bg-shark-700"></div>
                <div class="p-4 space-y-4 mt-2">
                    <div class="h-4 bg-shark-700 rounded-full w-3/4"></div>
                    <div class="h-3 bg-shark-700 rounded-full w-1/2 mb-4"></div>
                    <div class="flex items-center justify-between pt-2">
                        <div class="h-3 bg-shark-700 rounded-full w-12"></div>
                        <div class="h-6 bg-shark-700 rounded-full w-16"></div>
                    </div>
                    <div class="h-1.5 bg-shark-700 rounded-full w-full mt-2"></div>
                </div>
            </article>

            <article class="rounded-2xl overflow-hidden bg-shark-800 border border-shark-700/50 animate-pulse hidden sm:block">
                <div class="aspect-video bg-shark-700"></div>
                <div class="p-4 space-y-4 mt-2">
                    <div class="h-4 bg-shark-700 rounded-full w-4/5"></div>
                    <div class="h-3 bg-shark-700 rounded-full w-2/5 mb-4"></div>
                    <div class="flex items-center justify-between pt-2">
                        <div class="h-3 bg-shark-700 rounded-full w-12"></div>
                        <div class="h-6 bg-shark-700 rounded-full w-16"></div>
                    </div>
                    <div class="h-1.5 bg-shark-700 rounded-full w-full mt-2"></div>
                </div>
            </article>

            <article class="rounded-2xl overflow-hidden bg-shark-800 border border-shark-700/50 animate-pulse hidden lg:block">
                <div class="aspect-video bg-shark-700"></div>
                <div class="p-4 space-y-4 mt-2">
                    <div class="h-4 bg-shark-700 rounded-full w-2/3"></div>
                    <div class="h-3 bg-shark-700 rounded-full w-1/3 mb-4"></div>
                    <div class="flex items-center justify-between pt-2">
                        <div class="h-3 bg-shark-700 rounded-full w-12"></div>
                        <div class="h-6 bg-shark-700 rounded-full w-16"></div>
                    </div>
                    <div class="h-1.5 bg-shark-700 rounded-full w-full mt-2"></div>
                </div>
            </article>

            <article class="rounded-2xl overflow-hidden bg-shark-800 border border-shark-700/50 animate-pulse hidden xl:block">
                <div class="aspect-video bg-shark-700"></div>
                <div class="p-4 space-y-4 mt-2">
                    <div class="h-4 bg-shark-700 rounded-full w-5/6"></div>
                    <div class="h-3 bg-shark-700 rounded-full w-1/2 mb-4"></div>
                    <div class="flex items-center justify-between pt-2">
                        <div class="h-3 bg-shark-700 rounded-full w-12"></div>
                        <div class="h-6 bg-shark-700 rounded-full w-16"></div>
                    </div>
                    <div class="h-1.5 bg-shark-700 rounded-full w-full mt-2"></div>
                </div>
            </article>
        </div>

        <div id="deals-grid" class="hidden grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>
    
    <footer class="relative z-10 border-t border-shark-700/50 mt-16 pb-8">
        <div class="w-full h-px mb-8" style="background: linear-gradient(90deg, transparent, rgba(57,255,20,0.3), rgba(0,212,255,0.2), transparent);"></div>

        <div class="max-w-screen-2xl mx-auto px-4 md:px-8 flex flex-col md:flex-row items-center justify-between gap-6">

            <div class="flex items-center gap-2">
                <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 opacity-60">
                    <path d="M4 28 C4 28, 8 10, 18 8 C24 7, 30 12, 32 20 L28 22 C26 16, 22 13, 18 14 C12 15, 8 24, 8 24 Z" fill="#39FF14" opacity="0.7"/>
                    <path d="M28 22 L32 20 L30 28 Z" fill="#00D4FF" opacity="0.6"/>
                </svg>
                <span class="font-display font-bold text-sm text-slate-500 uppercase tracking-widest">Mark<span class="text-neon-green/60">Deals</span></span>
            </div>

            <nav class="flex items-center gap-6">
                <a href="https://github.com/Markscsl" target="_blank" class="text-xs text-slate-600 hover:text-slate-400 transition-colors duration-200 font-body">GitHub</a>
            </nav>

            <div class="flex flex-col items-center md:items-end gap-1.5">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-600 font-body uppercase tracking-widest">Powered by</span>
                    <a href="https://www.cheapshark.com/api" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full border border-neon-green/30 hover:border-neon-green/60 transition-all duration-300 group" style="background: rgba(57,255,20,0.05);">
                        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 group-hover:drop-shadow-[0_0_4px_rgba(57,255,20,0.8)] transition-all">
                            <path d="M2 15 C2 15, 4.5 5, 10 4 C13 3.5, 16 6, 17 10 L15 11 C14 8, 12 6.5, 10 7 C7 7.5, 4.5 13, 4.5 13 Z" fill="#39FF14" opacity="0.85"/>
                            <path d="M15 11 L17 10 L16 15 Z" fill="#00D4FF" opacity="0.8"/>
                        </svg>
                        <span class="text-[10px] font-display font-bold text-neon-green/70 group-hover:text-neon-green uppercase tracking-wider transition-colors">CheapShark API</span>
                    </a>
                </div>
                <p class="text-[10px] text-slate-700 font-body">
                    &copy; <span id="footer-year">2026</span> MarkDeals · Não afiliado com nenhuma loja
                </p>
            </div>

        </div>
    </footer>
</body>

</html>

<script src="script.js"></script>
